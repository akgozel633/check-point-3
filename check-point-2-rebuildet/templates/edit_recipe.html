{% extends "base.html" %}

{% block content %}

<div class="form-container" style="max-width: 700px;">

<h2>Edit Recipe</h2>

<form method="POST" action="{{ url_for('edit', recipe_id=recipe.id) }}">

<div class="form-group">
<label>Recipe Name</label>
<input type="text" name="name" class="form-input" value="{{ recipe.name }}" required>
</div>

<div class="form-group">
<label>Category</label>
<input type="text" name="category" class="form-input" value="{{ recipe.category }}">
</div>

<div class="form-group">
<label>Image URL</label>
<input type="text" name="image_url" class="form-input" value="{{ recipe.image_url }}">
</div>

<div class="form-group">
<label>Ingredients</label>
<textarea name="ingredients" class="form-input" rows="6" required>{{ recipe.ingredients }}</textarea>
</div>

<div class="form-group">
<label>Instructions</label>
<textarea name="instructions" class="form-input" rows="6" required>{{ recipe.instructions }}</textarea>
</div>

<div class="form-group">
<label>Rating (1-5)</label>
<input type="number" name="rating" min="1" max="5" class="form-input" value="{{ recipe.rating }}">
</div>
