{% extends 'base.html' %}

{% block content %}
<h2>Log In</h2>
<div class="form-container">
  <form method="post" action="{{ url_for('login') }}" class="form" id="login-form">
      <div class="form-group">
          <label>Username</label>
          <input class="form-input" type="text" name="username" required>
      </div>
      <div class="form-group">
          <label>Password</label>
          <div class="password-input-row">
              <input class="form-input" type="password" name="password" id="login-password" required>
              <label class="show-toggle"><input type="checkbox" id="login-show"> Show</label>
          </div>
      </div>
      <div class="form-group">
          <label>Captcha: Solve {{ captcha_question }}</label>
          <input class="form-input" type="text" name="captcha" required>
      </div>
      <button type="submit" class="btn btn-primary">Log In</button>
      <div style="margin-top: 0.75rem;">
          <a href="{{ url_for('signup') }}">Or Sign Up</a>
      </div>
  </form>
</div>
{% endblock %}
